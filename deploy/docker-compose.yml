# PHANTOM production deployment.
#
# Two services behind Caddy reverse proxy:
#   - relay   : Rust WebSocket relay (ciphertext store-and-forward, in-memory).
#   - caddy   : TLS termination + WebSocket passthrough + static file serving
#               for /.well-known/assetlinks.json and a placeholder landing.
#
# Run from the repository root:
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# See deploy/README.md for DNS + Cloudflare setup requirements.

services:
  relay:
    build:
      # Build context is the repo root so the Dockerfile can reach
      # both services/Cargo.toml and services/relay/.
      context: ..
      dockerfile: services/relay/Dockerfile
    image: phantom-relay:latest
    container_name: phantom-relay
    restart: unless-stopped
    env_file:
      - .env
    # No host port binding — Caddy reaches the relay on the internal network only.
    # Exposing the port publicly would bypass TLS termination and rate limits.
    expose:
      - "8080"
    networks:
      - phantom-internal
    # Drop all kernel capabilities — relay does not need any privileged ops.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Read-only rootfs. The relay writes abuse-report logs to /var/phantom
    # (see state.rs `append_report_to_disk`), so that path is a writable volume.
    read_only: true
    tmpfs:
      - /tmp:size=16m
    volumes:
      - phantom-reports:/var/phantom
    # ADR-014 (Transport TCP Keepalive Strategy, 2026-05-04): tighten
    # kernel keepalive timing in this container's network namespace so
    # any keepalive probe relay or Caddy emits actually fires within a
    # window that beats Russian-carrier CGN idle timeouts (50-90s).
    # Per-connection SO_KEEPALIVE + setsockopt overrides in main.rs are
    # the primary defence; these sysctls are belt-and-braces for any
    # tokio/hyper code path that relies on kernel defaults.
    sysctls:
      net.ipv4.tcp_keepalive_time: 30
      net.ipv4.tcp_keepalive_intvl: 10
      net.ipv4.tcp_keepalive_probes: 3

  caddy:
    image: caddy:2.8-alpine
    container_name: phantom-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 via QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./well-known:/srv/well-known:ro
      - ./landing:/srv/landing:ro
      # Legal documents (Terms of Service + Privacy Policy) served at
      # /terms and /privacy on phntm.pro. Source of truth: /legal at the
      # repository root, mounted read-only.
      - ../legal:/srv/legal:ro
      - caddy-data:/data        # Let's Encrypt certs + keys
      - caddy-config:/config
    networks:
      - phantom-internal
    depends_on:
      - relay
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # needed to bind :80 and :443
    security_opt:
      - no-new-privileges:true
    # ADR-014: Caddy runs on Go, which enables SO_KEEPALIVE on accepted
    # TCP connections by default with a 15s TCP_KEEPIDLE. The interval
    # and probe count, however, inherit from the network-namespace
    # kernel sysctls — which by default are 75s/9 and would not detect
    # a dead NAT entry inside a 60s carrier idle window. Override so
    # Go's auto-keepalive becomes effective for our scenario:
    #   idle 15s (Go default) -> probe every 10s -> 3 probes = ~45s
    # to dead detection. Beats CGN typical 60s idle.
    sysctls:
      net.ipv4.tcp_keepalive_time: 30
      net.ipv4.tcp_keepalive_intvl: 10
      net.ipv4.tcp_keepalive_probes: 3

networks:
  phantom-internal:
    driver: bridge

volumes:
  # Relay abuse-report log. Persists across container restarts so admin reports
  # are preserved. Relay stores ONLY cleartext abuse metadata here — never
  # message ciphertexts, never plaintext messages.
  phantom-reports:
  # Caddy persists issued certificates here — losing this volume triggers
  # re-issuance and risks Let's Encrypt rate limits (50 certs/week/domain).
  caddy-data:
  caddy-config:
