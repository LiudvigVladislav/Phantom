# PHANTOM production deployment.
#
# Services behind Caddy reverse proxy:
#   - relay            : Rust WebSocket relay (ciphertext store-and-forward).
#   - caddy            : TLS termination + WebSocket passthrough + static
#                        file serving for /.well-known/, legal pages,
#                        landing, and the WebTunnel bridge subdomain.
#   - tor              : v3 onion service for the relay (ADR-016 data plane).
#   - ntfy             : Self-hosted UnifiedPush distributor (ADR-016
#                        wake-up plane).
#   - webtunnel-bridge : Operator-controlled Tor entry bridge with
#                        WebTunnel pluggable transport (ADR-016 Stage 5C —
#                        censorship resistance for users in RU / IR / CN
#                        whose ISP blocks public Snowflake brokers).
#   - xray             : Xray-core VLESS+REALITY listener on :8443
#                        (Stage 5E.A — outer transport that bypasses
#                        TSPU's "16 KB curtain" by mimicking the TLS
#                        handshake of www.microsoft.com).
#
# Run from the repository root:
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# See deploy/README.md for DNS + Cloudflare setup requirements.
# See deploy/tor-onion-setup.md for Tor onion address retrieval.
# See deploy/webtunnel-bridge-setup.md for WebTunnel bridge bring-up.

services:
  relay:
    build:
      # Build context is the repo root so the Dockerfile can reach
      # both services/Cargo.toml and services/relay/.
      context: ..
      dockerfile: services/relay/Dockerfile
    image: phantom-relay:latest
    container_name: phantom-relay
    restart: unless-stopped
    env_file:
      - .env
    # Production: no PUBLIC host port binding. Caddy reaches the relay on the
    # internal Docker network only. Exposing the port publicly would bypass TLS
    # termination, edge auth-challenge rate limits, and abuse-report logging.
    #
    # Diagnostic (RC-DIRECT-STABILITY1 Arm A): a loopback-only host binding
    # exposes the relay on 127.0.0.1:8081 of the VPS host. This is unreachable
    # from any non-loopback interface by Linux kernel routing — it is NOT a
    # public exposure. A dev machine reaches it via an SSH tunnel
    # (`ssh -N -L 8081:127.0.0.1:8081 phantom@relay.phntm.pro`); a physical
    # Android device additionally needs `adb reverse tcp:8081 tcp:8081` so
    # the on-device URL stays `ws://127.0.0.1:8081/ws` and Inv-NoLanInNsc
    # holds. See docs/tracks/rc-direct-stability1.md §4 Arm A for the full
    # field playbook.
    #
    # The 127.0.0.1: prefix is mandatory and machine-enforced: the CI gate at
    # .github/workflows/deploy-lint.yml (Inv-BypassIsLoopbackOnly, shipped in
    # PR #273) fails the merge if this entry loses the loopback prefix or
    # binds to 0.0.0.0 / unqualified PORT:8080. Removing the prefix would
    # silently default to public exposure in Docker.
    #
    # TODO REVERT after RC-DIRECT-STABILITY1 Arm A field run completes:
    # remove the `ports:` block entirely, then on the VPS
    # `docker compose up -d --force-recreate relay` (brief ~5 s container
    # restart; existing WS users drop and reconnect via REST fallback).
    ports:
      - "127.0.0.1:8081:8080"
    expose:
      - "8080"
    networks:
      - phantom-internal
    # Drop all kernel capabilities — relay does not need any privileged ops.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Read-only rootfs. The relay writes its four append-log state files
    # to /var/phantom (RC-RELAY-STATE-DIR-REPAIR PR-1a):
    #   reports.jsonl       — abuse reports submitted via /report
    #   blocklist.txt       — admin-blocked identity prefixes
    #   push_tokens.jsonl   — UnifiedPush topic URL per identity (ADR-016)
    #   prekeys.jsonl       — X3DH SPK / OPK bundle journal (ADR-009)
    # That path is the only writable mount besides /tmp (tmpfs 16m). The
    # relay resolves each file against RELAY_STATE_DIR (env below);
    # /var/phantom is seeded by the Dockerfile runtime stage as
    # phantom:phantom (uid=10001, gid=10001) with mode 750. The deploy-
    # lint CI gate at .github/workflows/deploy-lint.yml enforces
    # read_only:true + this volume target + the env value + the
    # Dockerfile WORKDIR in-sync + the explicit groupadd/useradd shape
    # so the runtime gid stays pinned at 10001 (Inv-1..Inv-5).
    read_only: true
    tmpfs:
      - /tmp:size=16m
    volumes:
      # RC-RELAY-STATE-DIR-REPAIR PR-1a: this mount pairs with
      # `RELAY_STATE_DIR: /var/phantom` in `environment:` below. A rename
      # of either side without the other reintroduces the pre-fix silent-
      # EROFS bug — the deploy-lint CI gate asserts both are present
      # in-sync. See `docs/tracks/rc-relay-state-dir-repair.md` §5.2 and
      # §7.2.
      - phantom-reports:/var/phantom
    # Default ntfy URL inside the docker network — overridable via .env if
    # the operator runs ntfy outside the compose stack.
    environment:
      RELAY_NTFY_URL: ${RELAY_NTFY_URL:-http://ntfy:80}
      # RC-RELAY-STATE-DIR-REPAIR PR-1a §5.2: base directory the relay
      # writes reports.jsonl / blocklist.txt / push_tokens.jsonl /
      # prekeys.jsonl to. MUST match the volume target above. See
      # `docs/tracks/rc-relay-state-dir-repair.md` §5.2.
      RELAY_STATE_DIR: /var/phantom

  caddy:
    image: caddy:2.8-alpine
    container_name: phantom-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 via QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./well-known:/srv/well-known:ro
      # phntm.pro static site (index/about/roadmap/donate, bilingual EN/RU,
      # animations). Source of truth: repo-root `site/`, mounted read-only
      # into the container path that Caddyfile's phntm.pro vhost serves
      # (`/srv/landing` — kept stable so the Caddyfile root doesn't need
      # to change). The previous stub at `deploy/landing/` is preserved
      # in git history but is no longer bind-mounted; revert this line to
      # `./landing:/srv/landing:ro` to roll back to the stub.
      # See `site/README.md` for the deploy + verify procedure.
      - ../site:/srv/landing:ro
      # Static placeholder landing for the WebTunnel bridge subdomain.
      # Anyone scanning bridge.phntm.pro sees a small static site rather
      # than an empty 404 — defence in depth against TSPU enumeration.
      - ./webtunnel-landing:/srv/webtunnel-landing:ro
      # Legal documents (Terms of Service + Privacy Policy) served at
      # /terms and /privacy on phntm.pro. Source of truth: /legal at the
      # repository root, mounted read-only.
      - ../legal:/srv/legal:ro
      # funding.json (fundingjson.org / FLOSS-fund machine-readable
      # funding manifest) served at https://phntm.pro/funding.json.
      # Source of truth: repo-root `funding.json`, mounted read-only as
      # a single file into /srv/funding/. Single-file bind-mount (not
      # the whole repo root) so we don't accidentally expose any other
      # repo file via Caddy if a future route is added with the wrong
      # root path. To update the served content: edit the repo-root
      # file, commit + push, then on the VPS run `git pull` followed
      # by `docker compose -f deploy/docker-compose.yml up -d caddy`
      # (NOT `restart caddy` — restart keeps the old mounts; up -d
      # recreates the container with the new bind-mount if needed).
      - ../funding.json:/srv/funding/funding.json:ro
      - caddy-data:/data        # Let's Encrypt certs + keys
      - caddy-config:/config
    environment:
      # Caddyfile bridge.phntm.pro vhost uses `{$WEBTUNNEL_SECRET_PATH}`
      # parse-time substitution to scope the WebTunnel reverse-proxy
      # matcher to a single secret path. Without explicit forwarding
      # of this env into the Caddy container, the matcher collapses to
      # literal "path /" — root reverse-proxies (502s for non-WebTunnel
      # clients) while the secret path falls through to the placeholder
      # (defeats the bridge). Discovered during bridge2 deploy 2026-05-06.
      WEBTUNNEL_SECRET_PATH: ${WEBTUNNEL_SECRET_PATH}
    networks:
      - phantom-internal
    depends_on:
      - relay
      - ntfy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # needed to bind :80 and :443
    security_opt:
      - no-new-privileges:true

  # ──────────────────────────────────────────────────────────────────────
  # Tor v3 onion service for the PHANTOM relay (ADR-016 data plane).
  #
  # The tor daemon connects out to the Tor network (clearnet egress to
  # entry guards) and exposes the relay to v3 onion clients via an
  # internal hidden service descriptor. Clients connect over Tor SOCKS5
  # to <onion>.onion:80 and the daemon proxies plaintext HTTP/WS to the
  # relay container on the same internal network. TLS is intentionally
  # NOT used over the onion address — Tor's circuit already provides
  # confidentiality + integrity + onion-address authentication, and
  # adding TLS would only break the latter without adding security.
  #
  # The onion key is generated on first start and persisted in a named
  # volume (see deploy/tor-onion-setup.md for retrieval procedure).
  # NEVER share the key file outside the operator team — it IS the
  # onion identity.
  # ──────────────────────────────────────────────────────────────────────
  tor:
    build:
      context: ./tor
      dockerfile: Dockerfile
    image: phantom-tor:latest
    container_name: phantom-tor
    restart: unless-stopped
    volumes:
      - ./tor/torrc:/etc/tor/torrc:ro
      - phantom-tor-data:/var/lib/tor
    networks:
      - phantom-internal
    depends_on:
      - relay
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # ──────────────────────────────────────────────────────────────────────
  # Operator-controlled WebTunnel bridge for the embedded Tor client
  # (ADR-016 Stage 5C — censorship-resistance).
  #
  # Why we run our own bridge: public Snowflake brokers (Netlify-hosted)
  # are blocked on Russian carrier networks (Test 10, 2026-05-05). Our
  # users in such networks need a bridge address that is NOT subject to
  # third-party blocking. Running our own WebTunnel server gives clients
  # a reachable entry point to the Tor network that looks like normal
  # HTTPS traffic to any DPI box.
  #
  # Architecture:
  #   PHANTOM client (kmp-tor + lyrebird) ──HTTPS WebSocket──▶
  #     Caddy at bridge.phntm.pro:443 ──reverse-proxy──▶
  #       webtunnel-bridge:15000 ──Tor protocol──▶
  #         Tor entry/middle/exit relays ──▶ phantom-tor (our onion) ──▶ relay
  #
  # Caveat (ADR-016 Alpha 2 acceptable risk): bridge + relay onion
  # currently live on the same VPS IP. A network-observing adversary
  # capable of enumerating both endpoints can correlate "user enters
  # PHANTOM bridge" with "PHANTOM client connects to relay onion".
  # Mitigations:
  #   - Most users are protected from EXTERNAL observers (TSPU, ISP) —
  #     that is the threat we built this bridge to address.
  #   - PHANTOM operator (us) can already see relay-side traffic by
  #     definition — running the entry bridge does not expand what we
  #     learn about our own users.
  # Beta plan: distribute bridge to a separate provider / region.
  # Documented in docs/operations/TOR_STACK_MAINTENANCE.md.
  # ──────────────────────────────────────────────────────────────────────
  webtunnel-bridge:
    image: thetorproject/webtunnel-bridge:latest
    container_name: phantom-webtunnel-bridge
    restart: unless-stopped
    user: debian-tor
    environment:
      # Bridge identity — operator-set, persisted across restarts via the
      # webtunnel-tor-state volume. NICKNAME is what BridgeDB / Tor metrics
      # show; EMAIL becomes the ContactInfo line in the bridge's torrc
      # (directory authorities use it as the abuse contact for the
      # operator).
      #
      # The container's entrypoint substitutes these env-var names
      # VERBATIM into the bundled torrc template:
      #   ${NICKNAME} → Nickname
      #   ${EMAIL}    → ContactInfo
      #   ${OR_PORT}  → ORPort
      #   ${PT_PORT}  → ServerTransportListenAddr port
      #   ${WEBTUNNEL_URL} → ServerTransportOptions webtunnel url=…
      # Renaming the container-side var (e.g. EMAIL → OPERATOR_EMAIL)
      # leaves ContactInfo blank, which deprioritises the bridge in
      # directory authority queries and slows first-time bootstrap from
      # ~90 s to several minutes (observed in Test 11, 2026-05-06).
      NICKNAME: ${WEBTUNNEL_NICKNAME:-PhantomBridge1}
      EMAIL: ${WEBTUNNEL_OPERATOR_EMAIL:-hello@phntm.pro}
      PT_PORT: 15000
      # Outbound OR port. Picked once per deploy and persisted so the
      # bridge identity stays stable. Set in deploy/.env to avoid
      # re-rolling on each compose up.
      OR_PORT: ${WEBTUNNEL_OR_PORT:-44389}
      # The HTTPS URL clients hit to reach this bridge. Includes the
      # secret path so any random scanner just sees the fake landing
      # served at bridge.phntm.pro/. Must match the Caddyfile vhost.
      WEBTUNNEL_URL: ${WEBTUNNEL_URL}
    expose:
      - "15000"
    networks:
      - phantom-internal
    volumes:
      # Tor bridge state — identity keys, descriptor cache, guards. Losing
      # this volume rotates the bridge fingerprint; clients with the old
      # one pinned in `OperatorBridges.kt` would silently fail. Back this
      # up alongside phantom-tor-data.
      - webtunnel-tor-state:/var/lib/tor
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # ──────────────────────────────────────────────────────────────────────
  # Self-hosted ntfy distributor for UnifiedPush (ADR-016 wake-up plane).
  #
  # Purpose: when an envelope is queued for an offline client, the relay
  # POSTs a one-byte payload to <ntfy_url>/<topic> where <topic> is the
  # client's pre-registered ntfy topic. The client's UnifiedPush
  # distributor on-device receives the wake-up and tells the PHANTOM app
  # to drain its queue over the regular data channel (direct WSS or
  # Tor onion, depending on Privacy Mode).
  #
  # Hardening references — see no-go-checks/03-ntfy-audit.md:
  #   - web-root: "disable" so the bundled web UI (which loads Google
  #     Fonts) never serves to users; only the HTTP push API is exposed.
  #   - attachment storage: disabled (we transport zero attachments).
  #   - upstream-base-url: not set, so APN/iOS forwarding is dormant.
  #   - firebase-key-file: not set, so FCM forwarding is dormant.
  # ──────────────────────────────────────────────────────────────────────
  # ──────────────────────────────────────────────────────────────────────
  # Xray-core — VLESS+REALITY outer transport (Stage 5E.A).
  #
  # REALITY makes the TLS handshake byte-for-byte identical to a handshake
  # with www.microsoft.com (Xray transparently reverse-proxies the genuine
  # cert chain on cache-miss). TSPU classifies the resulting flow as
  # benign big-tech CDN traffic and applies no throttle — bypassing the
  # "16-kilobyte curtain" empirically confirmed to break our WebTunnel
  # bridges on Hetzner AND FlokiNET (Test 11/12/13, 2026-05-05/06).
  #
  # Stage 5E.A scope (this PR):
  #   - Server-only. No Android changes.
  #   - Listens on 8443/tcp (separate from Caddy's 443) — operationally
  #     simplest. Stage 5E.B promotes to shared 443 via REALITY's
  #     proxy_protocol fallback to Caddy.
  #   - Validation path: desktop NekoBox client connects via this listener
  #     from a Russian carrier vantage. If that works end-to-end, Stage
  #     5E.B (Android libXray AAR) is unblocked.
  #
  # The config.json that this container reads is rendered on the host from
  # config.json.template + .env via deploy/xray/render-config.sh — neither
  # the rendered config nor .env are tracked in git (see .gitignore).
  # See deploy/xray/README.md for the full operator runbook.
  #
  # License: MPL-2.0 (Xray-core). Aggregation with our AGPL-3.0-or-later
  # is permitted at the docker-compose level (file-level copyleft, no
  # Xray source files modified). Same posture as v2rayNG / Hiddify.
  # ──────────────────────────────────────────────────────────────────────
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: phantom-xray
    restart: unless-stopped
    # Override the image's default CMD (which runs `xray -confdir
    # /usr/local/etc/xray/`, picking up the stock 00_log.json /
    # 01_api.json / … bundled inside the image — NOT our config). We
    # explicitly point xray at the single rendered config we mount below.
    command: ["run", "-c", "/etc/xray/config.json"]
    # Bind 8443 directly on the host. The container itself is the TLS
    # endpoint — Caddy is NOT in front (REALITY's whole value prop is the
    # genuine TLS-1.3 handshake the daemon mimics; Caddy as a proxy would
    # break the fingerprint).
    ports:
      - "8443:8443/tcp"
    volumes:
      # Rendered config — produced from config.json.template by the
      # render-config.sh script. Mounted read-only; Xray re-reads on
      # SIGHUP (or container restart).
      #
      # Footgun: the FILE must exist on the host BEFORE `docker compose
      # up`. Otherwise docker creates an empty DIRECTORY at the target
      # path (default bind-mount behaviour), and Xray then fails with
      # "is a directory". render-config.sh defensively removes any such
      # artefact before writing the real file. Operators: always run
      # render-config.sh BEFORE docker compose up.
      - ./xray/config.json:/etc/xray/config.json:ro
    # Healthcheck: `xray run -test -c /etc/xray/config.json` validates
    # config syntactically without starting the daemon. Modern Xray-core
    # (post-1.7) merged `test` into `run -test`; the old `xray test ...`
    # subcommand is gone. Detects broken configs before docker reports
    # the container "ready".
    healthcheck:
      test: ["CMD", "xray", "run", "-test", "-c", "/etc/xray/config.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - phantom-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: phantom-ntfy
    restart: unless-stopped
    command: serve
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml:ro
      - phantom-ntfy-cache:/var/cache/ntfy
    expose:
      - "80"
    networks:
      - phantom-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  phantom-internal:
    driver: bridge

volumes:
  # Relay state directory. Persists across container restarts so the four
  # append-log files (reports.jsonl, blocklist.txt, push_tokens.jsonl,
  # prekeys.jsonl) survive redeploys — see the `read_only` block on the
  # `relay:` service above and RC-RELAY-STATE-DIR-REPAIR PR-1a. Relay
  # stores ONLY cleartext abuse metadata + published prekey bundle
  # journal + UnifiedPush topic URLs + admin blocklist here; NEVER
  # message ciphertexts, NEVER plaintext messages, NEVER private keys.
  phantom-reports:
  # Caddy persists issued certificates here — losing this volume triggers
  # re-issuance and risks Let's Encrypt rate limits (50 certs/week/domain).
  caddy-data:
  caddy-config:
  # Tor hidden-service keys + descriptors. Losing this volume rotates
  # the onion address; clients with the old address pinned would be
  # unable to connect until they receive the new one. Back this up.
  phantom-tor-data:
  # ntfy message cache (small SQLite database). Bounded by max-message-size
  # in server.yml; tolerable to lose at the cost of replaying any
  # in-flight wake-ups.
  phantom-ntfy-cache:
  # WebTunnel bridge state — Tor identity keys + descriptor cache + guards.
  # CRITICAL to back up: losing this rotates the bridge fingerprint, and
  # every PHANTOM client with the old fingerprint hardcoded silently
  # stops connecting. Back up procedure mirrors phantom-tor-data — see
  # deploy/webtunnel-bridge-setup.md.
  webtunnel-tor-state:
