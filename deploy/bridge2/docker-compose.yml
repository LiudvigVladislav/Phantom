# PHANTOM bridge2 deployment (FlokiNET RO).
#
# This is a BRIDGE-ONLY stack — only Caddy + WebTunnel bridge.
# The relay, onion service, and ntfy distributor stay on the primary
# Hetzner host (deploy/docker-compose.yml). Bridge2 exists ONLY to give
# Russian-carrier users an entry point that escapes Hetzner's TSPU
# 16-KB-curtain flagging — see ADR-016 (Tor + UnifiedPush hybrid) Stage 5C/5D + research/bridge-host-verification-2026-05-06/. ADR-019 (Xray REALITY) supersedes this approach for Russian carrier traffic via Stage 5E.
#
# Hostname:    bridge2.phntm.pro  (DNS A + AAAA pointing at FlokiNET IP)
# Architecture footprint: 2 containers, ~200 MB RAM total.
#
# Run from this directory on the FlokiNET VPS:
#   docker compose -f docker-compose.yml up -d --build
#
# See bridge2-DEPLOY.md for the full provisioning walkthrough.

services:

  # ──────────────────────────────────────────────────────────────────────
  # Caddy — TLS terminator + secret-path reverse-proxy + fake landing.
  #
  # Same role as the Hetzner Caddy: terminates Let's Encrypt TLS for
  # bridge2.phntm.pro, routes the secret WebSocket path to the WebTunnel
  # bridge container, serves a tiny placeholder landing for any other
  # path (defence-in-depth against TSPU enumeration).
  # ──────────────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    container_name: phantom-bridge2-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 via QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./webtunnel-landing:/srv/webtunnel-landing:ro
      - caddy-data:/data        # Let's Encrypt certs + keys
      - caddy-config:/config
    environment:
      # Caddyfile uses `{$WEBTUNNEL_SECRET_PATH}` parse-time env
      # substitution to scope the WebTunnel reverse-proxy matcher to a
      # single secret path. Without this env explicitly forwarded into
      # the Caddy container, the substitution becomes empty and the
      # matcher collapses to literal "path /" — which inverts behaviour:
      # the root reverse-proxies to webtunnel-bridge (and 502s for any
      # non-WebTunnel client), while the secret path falls through to
      # the placeholder landing (defeating the bridge entirely).
      # Discovered in initial bridge2 deploy 2026-05-06.
      WEBTUNNEL_SECRET_PATH: ${WEBTUNNEL_SECRET_PATH}
    networks:
      - bridge2-internal
    depends_on:
      - webtunnel-bridge
      - phantom-relay-ro
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # binds 80 + 443 as non-root
    security_opt:
      - no-new-privileges:true

  # ──────────────────────────────────────────────────────────────────────
  # PHANTOM media relay (PR-INFRA-MediaRO, 2026-05-18 — diagnostic / beta).
  #
  # Co-tenant on the bridge2 VPS as a *zero-cost* second media endpoint
  # for the M2c.0 cap probe. The probe on Helsinki (Test #66.2) measured
  # full-roundtrip ceiling at 2400 wire bytes; we now want to see if a
  # different ASN/country (FlokiNET Romania vs Hetzner Helsinki) lifts
  # that ceiling on Tele2 LTE.
  #
  # Hard constraints because this box is shared with the WebTunnel bridge:
  #   - mem_limit caps RAM at 384 MB so a runaway relay can't starve the
  #     bridge process. With 1 GB total VPS RAM and Tor+WebTunnel needing
  #     ~200 MB headroom, leaving ~400 MB for the relay is tight but safe.
  #   - read_only rootfs + minimal tmpfs.
  #   - cap_drop ALL.
  #   - container does NOT bind a host port; Caddy reverse-proxies via
  #     bridge2-internal Docker network.
  #   - No ntfy / no push notifications (the push backend lives on
  #     Helsinki primary and is irrelevant for the probe).
  #
  # Rollback: docker compose -f docker-compose.yml stop phantom-relay-ro
  # then remove the media-ro.phntm.pro vhost block from Caddyfile and
  # `docker exec phantom-bridge2-caddy caddy reload --config /etc/caddy/Caddyfile`.
  # WebTunnel bridge is unaffected.
  # ──────────────────────────────────────────────────────────────────────
  phantom-relay-ro:
    build:
      # Build context is the repo root (../../) so the Dockerfile can
      # reach both services/Cargo.toml and services/relay/.
      context: ../..
      dockerfile: services/relay/Dockerfile
    image: phantom-relay:latest
    container_name: phantom-relay-ro
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    networks:
      - bridge2-internal
    # Hard memory cap. If the relay tries to exceed this Docker kills it
    # rather than letting it OOM-kill the WebTunnel bridge alongside it.
    mem_limit: 384m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Read-only rootfs. The relay writes its abuse-report log to
    # /var/phantom (see state.rs `append_report_to_disk`). On bridge2 we
    # don't expect abuse reports against the diagnostic endpoint but the
    # volume is provided for safety so the relay doesn't crash trying to
    # write to a read-only path.
    read_only: true
    tmpfs:
      - /tmp:size=16m
    volumes:
      - phantom-relay-ro-reports:/var/phantom

  # ──────────────────────────────────────────────────────────────────────
  # Operator-controlled WebTunnel bridge.
  #
  # Identical configuration pattern to the Hetzner bridge — same image,
  # same env-var template substitution, same volume layout. Differences:
  #   - DIFFERENT NICKNAME (PhantomBridge2)
  #   - DIFFERENT OR_PORT (44609, not 35137)
  #   - DIFFERENT WEBTUNNEL_URL (bridge2.phntm.pro/<new secret>)
  #   - DIFFERENT bridge fingerprint (auto-generated on first run)
  #
  # The bridge is OPERATIONALLY independent of bridge1 — losing one
  # does not affect the other. Both will be advertised in
  # OperatorBridges.WEBTUNNEL with operator-1 first, operator-2 second;
  # tor's bridge-selection logic races and uses whichever responds.
  # ──────────────────────────────────────────────────────────────────────
  webtunnel-bridge:
    image: thetorproject/webtunnel-bridge:latest
    container_name: phantom-bridge2-webtunnel
    restart: unless-stopped
    user: debian-tor
    environment:
      # Container-side env names match the upstream torrc template
      # substitution VERBATIM (see Hetzner docker-compose for rationale).
      NICKNAME: ${WEBTUNNEL_NICKNAME:-PhantomBridge2}
      EMAIL: ${WEBTUNNEL_OPERATOR_EMAIL:-hello@phntm.pro}
      PT_PORT: 15000
      OR_PORT: ${WEBTUNNEL_OR_PORT:-44609}
      WEBTUNNEL_URL: ${WEBTUNNEL_URL}
    expose:
      - "15000"
    networks:
      - bridge2-internal
    volumes:
      # Bridge identity keys + descriptor cache. Losing this volume
      # rotates the bridge fingerprint and breaks every shipped APK
      # that pinned the old fingerprint. Back this up alongside the
      # Hetzner phantom-tor-data volume.
      - webtunnel-tor-state:/var/lib/tor
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  bridge2-internal:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  webtunnel-tor-state:
  phantom-relay-ro-reports:
