# PHANTOM TCP keepalive — host-level sysctl override.
#
# ADR-014 (Transport TCP Keepalive Strategy, 2026-05-04).
#
# Purpose:
#   Make all TCP sockets on the VPS host detect a dead peer faster than the
#   kernel default (which is wildly too slow for cellular CGN traversal).
#   Linux defaults: tcp_keepalive_time=7200s, intvl=75s, probes=9 — total
#   dead-detection window is over two hours.
#
#   Phantom-tuned: 30 / 10 / 3 -> 60s window, comfortably inside the
#   50-90s NAT idle-timeout typical for Russian mobile carriers (MTS,
#   Megafon, Beeline, Tele2, Yota).
#
# Per-container overrides in deploy/docker-compose.yml replicate these
# values in each container's network namespace. Setting them at the host
# level too is a safety net for any future host-network process and any
# direct `docker run` not using compose.
#
# Install:
#   sudo cp deploy/99-phantom-keepalive.conf /etc/sysctl.d/
#   sudo sysctl -p /etc/sysctl.d/99-phantom-keepalive.conf
#
# Verify (should print 30, 10, 3):
#   sysctl net.ipv4.tcp_keepalive_time net.ipv4.tcp_keepalive_intvl net.ipv4.tcp_keepalive_probes
#
# Rollback (kernel defaults):
#   sudo rm /etc/sysctl.d/99-phantom-keepalive.conf
#   sudo sysctl --system

net.ipv4.tcp_keepalive_time = 30
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 3
