;
; RC-DIRECT-STABILITY1 Arm A.2 — stunnel config for public non-Caddy TLS
; bypass on host port :8444 (host port :8443 already bound by production
; `phantom-xray` REALITY+WSS endpoint — see overlay docker-compose.armA2.yml
; ports comment + §4 Arm A.2 PR-8a implementation record port-choice note).
; Inside the container stunnel still accepts on :8443; the Docker
; port-mapping in the overlay republishes container 8443 onto host 8444.
;
; Architecture. Pure TLS terminator. Accept TLS 1.2+ on container's
; :8443 (public reach via host :8444), decrypt, forward raw TCP to the
; relay container at relay:8080 on the Docker
; compose network. No HTTP awareness, no WS-aware proxying, no Upgrade-
; header parsing — relay receives the HTTP/WS upgrade directly after
; stunnel decrypts.
;
; Wording bound (§4 Arm A.2). Removes Caddy's TLS + HTTP/WS proxy layer
; while adding only a TLS unwrap + raw TCP forwarder. The W outcome from
; the Arm A.2 W/X/Y discriminator reads as "Caddy edge path is in the
; kill chain or contributes" — NOT "TLS is innocent" (TLS is still
; present here, just stunnel TLS not Caddy TLS).
;
; Source of truth for scope: docs/tracks/rc-direct-stability1.md §4 Arm A.2.

; Run stunnel in foreground so `docker logs phantom-stunnel-arm-a2`
; picks up everything.
foreground = yes

; Disable pid file creation. The container rootfs is read_only (per
; docker-compose.armA2.yml security posture); stunnel's default
; /var/run/stunnel.pid write attempt at startup would fail with EROFS,
; producing a deploy-time surprise. With `foreground = yes` we don't
; need a pid file for process management — explicit empty `pid =`
; removes the write entirely. Locked after PR-8a Alpine-build fixup
; deploy review 2026-06-05.
pid =

; debug level 4 = info. Enough to see connect/accept events per
; capture-window session for post-test analysis without flooding.
debug = 4
output = /dev/stdout

; Drop privileges where possible. UID/GID inside the container must be
; able to read the mounted PEM cert + key. Caddy provisioned the volume
; as root:root with mode 700 directories + 600 files. With default
; Docker (no user-namespace remapping), root in the stunnel container
; can read root-owned files in the shared caddy-data volume.
;
; stunnel as root inside its own container is bounded by the container
; security posture in docker-compose.armA2.yml: cap_drop ALL +
; no-new-privileges + read_only rootfs + time-boxed exposure. Blast
; radius if a stunnel-specific 0-day fires is small.

[relay-arm-a2]
; Public TLS endpoint. Bind to all interfaces inside the container; the
; container's :8443 port is published on the host's :8444 via the
; compose `ports:` directive (host :8443 already bound by phantom-xray).
accept = 0.0.0.0:8443

; Forward raw TCP to the relay container on the compose network. Docker
; DNS resolves `relay` to the relay container's internal IP on the
; phantom-internal (actual: deploy_phantom-internal) network.
;
; 127.0.0.1:8080 is INVALID here — that would resolve to stunnel's own
; container loopback. The host-network / native stunnel deployment path
; from §4 Arm A.2 (Refined scope rule) is NOT taken here; this overlay
; runs stunnel as a compose service with bridge networking.
connect = relay:8080

; PEM cert + EC private key. Read-only from Caddy's data volume.
;
; Path discovered on VPS 2026-06-04 inside the Caddy container at
; /data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/
;   relay.phntm.pro/relay.phntm.pro.{crt,key}
;
; The same volume is mounted at /data inside this stunnel container by
; docker-compose.armA2.yml — same path as inside Caddy, so the cert
; path is identical in both containers. Cert/key bytes do NOT enter
; git per §4 Arm A.2 P2 hard gate 1.
;
; Cert format verified PEM (-----BEGIN CERTIFICATE-----), key format
; verified PEM EC (-----BEGIN EC PRIVATE KEY-----).
cert = /data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/relay.phntm.pro/relay.phntm.pro.crt
key  = /data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/relay.phntm.pro/relay.phntm.pro.key

; TLS hardening per §4 Arm A.2 Security mini-lock.
; TLS 1.2 minimum, TLS 1.3 preferred. SSLv2/v3 and TLS 1.0/1.1 disabled.
sslVersionMin = TLSv1.2
sslVersionMax = TLSv1.3
options = NO_SSLv2
options = NO_SSLv3
options = NO_TLSv1
options = NO_TLSv1.1

; Cipher hardening — strong ciphers only, exclude NULL/EXPORT/DES/MD5/PSK/RC4.
ciphers = HIGH:!aNULL:!eNULL:!EXPORT:!DES:!MD5:!PSK:!RC4
ciphersuites = TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256

; Connection cap — light at the stunnel layer to avoid trivial DoS on
; the diagnostic surface during the capture window. Relay's existing
; rate-limit applies post-decrypt for steady-state. 50 simultaneous
; clients is much more than a single device + manual probing needs.
; Adjust upward only if the field test legitimately requires it.
clients = 50
