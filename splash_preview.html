<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTOM — Splash Screen Prototype</title>
<style>
  :root {
    --bg-deep:    #0B0D12;
    --accent:     #00D4FF;
    --text:       #E8F4F8;
    --text-dim:   #6B8A9A;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #070809;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 24px 60px;
    gap: 32px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .toggle-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.5px;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 200ms, border-color 200ms, color 200ms;
  }
  .toggle-btn:hover, .toggle-btn.active {
    background: rgba(0, 212, 255, 0.1);
    border-color: rgba(0, 212, 255, 0.35);
    color: var(--accent);
  }
  .label-chip {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── Phone frame ── */
  .phone-wrap { position: relative; transition: opacity 300ms; }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 54px;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: var(--bg-deep);
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 6px #1a1c22,
      0 0 0 8px rgba(255,255,255,0.06),
      0 40px 80px rgba(0,0,0,0.7);
  }
  .dynamic-island {
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 20;
  }
  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 54px;
    z-index: 10;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 6px;
    font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.7);
  }
  .status-bar .time { font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .phone-btn { position: absolute; background: #1a1c22; border-radius: 3px; }
  .phone-btn.power   { right: -9px; top: 160px; width: 4px; height: 72px; }
  .phone-btn.vol-up  { left: -9px;  top: 140px; width: 4px; height: 52px; }
  .phone-btn.vol-dn  { left: -9px;  top: 204px; width: 4px; height: 52px; }
  .phone-btn.mute    { left: -9px;  top: 102px; width: 4px; height: 28px; }

  /* ── Splash content ── */
  .splash {
    position: absolute;
    inset: 0;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /*
   * Logo container — sonar rings live here as absolute children
   * so they always expand from the exact center of the logo image.
   */
  .logo-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation:
      fadeIn 600ms ease forwards,
      logoPulse 3s ease-in-out 700ms infinite;
  }

  .logo-wrap img {
    width: 160px;
    height: 160px;
    border-radius: 38px;
    position: relative;
    z-index: 2;
    display: block;
    mix-blend-mode: screen;
  }

  /* Sonar rings — absolutely centered on the logo */
  .sonar-ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 160px; height: 160px;
    margin-top: -80px; margin-left: -80px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0;
    pointer-events: none;
    animation: sonar 3s ease-out infinite;
    z-index: 1;
  }
  .sonar-ring:nth-child(1) { animation-delay: 0s; }
  .sonar-ring:nth-child(2) { animation-delay: 1s; }
  .sonar-ring:nth-child(3) { animation-delay: 2s; }

  @keyframes sonar {
    0%   { transform: scale(1);   opacity: 0.18; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes logoPulse {
    0%, 100% { transform: scale(1.0); }
    50%       { transform: scale(1.04); }
  }

  /* Text */
  .text-block {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .wordmark {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(10px);
    animation: slideUp 400ms ease forwards 400ms;
  }
  .tagline {
    font-size: 21px;
    font-weight: 300;
    color: var(--text);
    text-align: center;
    line-height: 1.4;
    padding: 0 40px;
    opacity: 0;
    transform: translateY(10px);
    animation: slideUp 400ms ease forwards 600ms;
  }
  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .version {
    position: absolute;
    bottom: 42px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    opacity: 0;
    animation: fadeIn 600ms ease forwards 1000ms;
  }

  /* ── Bare mode ── */
  .bare-view {
    display: none;
    width: 390px; height: 844px;
    background: var(--bg-deep);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  body.bare-mode .phone-wrap { display: none; }
  body.bare-mode .bare-view  { display: block; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="label-chip">PHANTOM Splash — Alpha 0.1</span>
  <button class="toggle-btn" id="toggleBtn" onclick="toggleMode()">Dark background only</button>
</div>

<!-- Phone frame -->
<div class="phone-wrap">
  <div class="phone-frame">
    <div class="phone-btn power"></div>
    <div class="phone-btn vol-up"></div>
    <div class="phone-btn vol-dn"></div>
    <div class="phone-btn mute"></div>
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
          <rect x="0"    y="8" width="3" height="4"  rx="0.8" fill="white"/>
          <rect x="4.5"  y="5" width="3" height="7"  rx="0.8" fill="white"/>
          <rect x="9"    y="2" width="3" height="10" rx="0.8" fill="white"/>
          <rect x="13.5" y="0" width="3" height="12" rx="0.8" fill="white" opacity="0.3"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M8 10.5a1 1 0 100-2 1 1 0 000 2z" fill="white"/>
          <path d="M4.5 7.5a4.9 4.9 0 017 0" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <path d="M1.5 4.5a8.5 8.5 0 0113 0" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="white" stroke-opacity="0.35"/>
          <rect x="2" y="2" width="16" height="8" rx="1.5" fill="white"/>
          <path d="M23 4v4a2 2 0 000-4z" fill="white" opacity="0.4"/>
        </svg>
      </div>
    </div>

    <div class="splash">
      <div class="logo-wrap">
        <div class="sonar-ring"></div>
        <div class="sonar-ring"></div>
        <div class="sonar-ring"></div>
        <img src="Phantom msg.png" alt="PHANTOM logo">
      </div>
      <div class="text-block">
        <span class="wordmark">PHANTOM</span>
        <span class="tagline">Your presence,<br>known to no one.</span>
      </div>
      <div class="version">Alpha 0.1</div>
    </div>
  </div>
</div>

<!-- Bare view -->
<div class="bare-view">
  <div class="splash">
    <div class="logo-wrap">
      <div class="sonar-ring"></div>
      <div class="sonar-ring"></div>
      <div class="sonar-ring"></div>
      <img src="Phantom msg.png" alt="PHANTOM logo">
    </div>
    <div class="text-block">
      <span class="wordmark">PHANTOM</span>
      <span class="tagline">Your presence,<br>known to no one.</span>
    </div>
    <div class="version">Alpha 0.1</div>
  </div>
</div>

<script>
  let bare = false;
  function toggleMode() {
    bare = !bare;
    const btn = document.getElementById('toggleBtn');
    document.body.classList.toggle('bare-mode', bare);
    btn.classList.toggle('active', bare);
    btn.textContent = bare ? 'Show phone frame' : 'Dark background only';
  }
</script>
</body>
</html>
