# SPDX-License-Identifier: AGPL-3.0-or-later
# Relay CI — split into a hard `build-test` gate and an advisory `lint` job.
#   build-test: cargo build (release) + cargo test on the workspace. Must pass.
#               Mirrors the command sequence used by services/relay/Dockerfile.
#   lint:       cargo fmt --check + cargo clippy with -D warnings.
#               continue-on-error so style drift surfaces in PR review without
#               blocking merge while the team agrees on a baseline. Tighten by
#               dropping continue-on-error once the lint debt is paid down.
#
# IMPORTANT: paths filter is intentionally NOT applied to `pull_request`
# triggers. GitHub branch protection rulesets that mark `Relay CI / build-test`
# as a required status check will deadlock on PRs that don't touch services/
# (workflow never runs → check stays in "Expected — Waiting" forever). Instead
# the job always fires on PRs and short-circuits internally when the diff
# touches no relay files. The `push` trigger keeps the paths filter so master
# pushes that don't touch the relay don't waste CI minutes on a no-op build.

name: Relay CI

on:
  push:
    branches: [master]
    paths:
      - 'services/**'
      - '.github/workflows/relay.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: relay-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # Full history needed for the diff-based change detection below — a
      # shallow clone has no merge base to diff against.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Detect whether this run touches anything the relay actually cares
      # about. On pull_request the workflow always fires (so the required
      # status check always reports), but if the PR doesn't touch services/
      # there's nothing to build — short-circuit to a green success.
      # On push (master) the paths filter already gated us, so always run.
      # On workflow_dispatch the operator asked for a build — always run.
      - name: Detect relay changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            if git diff --name-only "$base" "$head" -- 'services/**' '.github/workflows/relay.yml' | grep -q .; then
              echo "relevant=true" >> "$GITHUB_OUTPUT"
            else
              echo "relevant=false" >> "$GITHUB_OUTPUT"
              echo "::notice::No services/ or relay workflow changes in this PR — skipping cargo build/test."
            fi
          else
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install stable Rust toolchain
        if: steps.changes.outputs.relevant == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target dir
        if: steps.changes.outputs.relevant == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services

      - name: Build release
        if: steps.changes.outputs.relevant == 'true'
        working-directory: services
        run: cargo build --workspace --release

      - name: Run tests
        if: steps.changes.outputs.relevant == 'true'
        working-directory: services
        run: cargo test --workspace --no-fail-fast

      - name: Upload relay binary as artifact
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: phantom-relay-binary
          path: services/target/release/phantom-relay
          retention-days: 7
          if-no-files-found: error

  lint:
    # Advisory only — does not block PR merge yet. See header for rationale.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relay changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            if git diff --name-only "$base" "$head" -- 'services/**' '.github/workflows/relay.yml' | grep -q .; then
              echo "relevant=true" >> "$GITHUB_OUTPUT"
            else
              echo "relevant=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install stable Rust toolchain (with clippy + rustfmt)
        if: steps.changes.outputs.relevant == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target dir
        if: steps.changes.outputs.relevant == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services
          # Read-only — don't poison the build-test cache with lint-only deps.
          save-if: 'false'

      - name: Format check
        if: steps.changes.outputs.relevant == 'true'
        working-directory: services
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy (workspace, all targets)
        if: steps.changes.outputs.relevant == 'true'
        working-directory: services
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true
