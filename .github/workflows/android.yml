# Android CI — assembleDebug + jvmTest across all shared/core modules.
# androidInstrumentedTest is intentionally NOT run here (requires emulator;
# slow + flaky on free runners). Add a separate gated workflow if needed.

name: Android CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (caches dependencies, daemons, configuration cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # Common tests run on JVM target — fast, no Android SDK required.
      # These cover the actual cryptographic and protocol logic
      # (LibsodiumIdentityCryptoTest, IdentityManagerTest, FakeRelayTransportTest,
      # RelayMessageSerializationTest, InMemoryRepositoryTest,
      # DefaultMessagingServiceTest, Alpha0IntegrationTest).
      - name: Run shared/core JVM tests
        run: |
          ./gradlew \
            :shared:core:identity:jvmTest \
            :shared:core:crypto:jvmTest \
            :shared:core:storage:jvmTest \
            :shared:core:transport:jvmTest \
            :shared:core:messaging:jvmTest \
            --no-daemon \
            --stacktrace

      # Android debug build — exercises full assembly pipeline including
      # SQLDelight code-gen, Compose compiler, AGP 9.1.1.
      - name: Build Android debug APK
        run: ./gradlew :apps:android:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-debug-apk
          path: apps/android/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            shared/core/*/build/reports/tests/
            shared/core/*/build/test-results/
          retention-days: 7
