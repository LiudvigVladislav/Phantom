# SPDX-License-Identifier: AGPL-3.0-or-later
# Deploy hardening lint — pre-merge enforcement of deploy/ invariants that
# cannot be enforced at code level.
#
# Currently enforces one invariant: relay service in deploy/docker-compose.yml
# must not bind ports to non-loopback addresses. Background:
#   - The relay container runs on the internal Docker bridge and is reached
#     by Caddy for TLS termination + edge auth + rate limits.
#   - Production has NO host port binding on the relay service (the existing
#     comment at deploy/docker-compose.yml:39-40 documents this).
#   - Diagnostic experiments (e.g. RC-DIRECT-STABILITY1 Arm A bypass) need a
#     temporary host port binding to talk to the relay without Caddy in front.
#   - Such bindings MUST use 127.0.0.1:PORT:8080 (or ::1:PORT:8080). A missing
#     loopback prefix — i.e. PORT:8080 alone or 0.0.0.0:PORT:8080 — exposes
#     the relay's plain-WS endpoint to the public internet, bypassing TLS,
#     auth-rate-limiting, and Caddy edge protections. This gate fails closed
#     on such a typo BEFORE the change can be merged and deployed.
#
# Implementation: Python (preinstalled on ubuntu-latest) + PyYAML (installed
# in a dedicated workflow step) parses the compose file structurally rather
# than relying on regex over raw YAML, which avoids quoting / multiline-list /
# comment edge cases.

name: Deploy lint

on:
  push:
    branches: [master]
    paths:
      - 'deploy/docker-compose.yml'
      - 'services/relay/Dockerfile'
      - '.github/workflows/deploy-lint.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  relay-loopback-only-ports:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # On pull_request, short-circuit to green if the diff does not touch
      # the files this gate cares about. Mirrors the relay.yml pattern so
      # branch protection rulesets marking this check as required do not
      # deadlock on unrelated PRs.
      - name: Detect deploy-lint-relevant changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            if git diff --name-only "$base" "$head" -- \
                'deploy/docker-compose.yml' \
                'services/relay/Dockerfile' \
                '.github/workflows/deploy-lint.yml' \
                | grep -q .; then
              echo "relevant=true" >> "$GITHUB_OUTPUT"
            else
              echo "relevant=false" >> "$GITHUB_OUTPUT"
              echo "::notice::No deploy/docker-compose.yml / Dockerfile / workflow changes — skipping deploy-lint gates."
            fi
          else
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install PyYAML
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python3 -m pip install --quiet --user PyYAML
          python3 -c "import yaml; print(f'PyYAML {yaml.__version__}')"

      - name: Verify relay service ports are loopback-only
        if: steps.changes.outputs.relevant == 'true'
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import sys
          import yaml

          COMPOSE = "deploy/docker-compose.yml"

          # Loopback prefixes that are safe — both IPv4 and IPv6 forms.
          # Docker accepts either; the kernel restricts the bind to the
          # loopback interface in both cases.
          LOOPBACK_PREFIXES = ("127.0.0.1:", "::1:", "[::1]:")

          try:
              with open(COMPOSE, "r", encoding="utf-8") as f:
                  doc = yaml.safe_load(f)
          except FileNotFoundError:
              print(f"::notice::{COMPOSE} not present; nothing to check.")
              sys.exit(0)
          except yaml.YAMLError as e:
              print(f"::error file={COMPOSE}::Failed to parse compose YAML: {e}")
              sys.exit(2)

          services = (doc or {}).get("services", {}) or {}
          relay = services.get("relay", {}) or {}
          ports = relay.get("ports", []) or []

          if not ports:
              print(f"::notice::relay service in {COMPOSE} has no host port bindings — production-safe state. PASS.")
              sys.exit(0)

          print(f"Found {len(ports)} relay port binding(s):")
          for p in ports:
              print(f"  - {p!r}")
          print()

          invalid = []
          for entry in ports:
              # Each entry can be a string ("127.0.0.1:8081:8080") or a dict
              # (long-form syntax). Normalise to a string for the prefix test;
              # for long-form dicts, the relevant field is `host_ip` (defaults
              # to 0.0.0.0 if absent).
              if isinstance(entry, str):
                  s = entry.strip()
                  if not s.startswith(LOOPBACK_PREFIXES):
                      invalid.append(entry)
              elif isinstance(entry, dict):
                  host_ip = entry.get("host_ip", "")
                  # An empty host_ip in long-form syntax means Docker defaults
                  # to 0.0.0.0 — explicitly disallow that as well.
                  if host_ip not in ("127.0.0.1", "::1"):
                      invalid.append(entry)
              else:
                  # Unknown shape — fail closed.
                  invalid.append(entry)

          if invalid:
              print(f"::error file={COMPOSE}::Inv-BypassIsLoopbackOnly violated — relay service has non-loopback port binding(s):")
              for entry in invalid:
                  print(f"::error file={COMPOSE}::  {entry!r}")
              print()
              print("Bypass diagnostic experiments (e.g. RC-DIRECT-STABILITY1 Arm A) MUST")
              print("bind to 127.0.0.1:PORT:8080 or ::1:PORT:8080 only. A missing loopback")
              print("prefix defaults to 0.0.0.0 in Docker — exposing a TLS-free WS endpoint")
              print("to the public internet, bypassing Caddy edge protections.")
              print()
              print("See docs/tracks/rc-direct-stability1.md §3 Inv-BypassIsLoopbackOnly.")
              sys.exit(1)

          print("All relay port bindings are loopback-only. PASS.")
          PYEOF

  # RC-RELAY-STATE-DIR-REPAIR PR-1a §7.2 — assert that the relay service's
  # state-file persistence contract is intact end-to-end across compose and
  # Dockerfile. All FOUR checks below must hold, else prod ships the pre-fix
  # silent-EROFS regression (docs/tracks/rc-relay-state-dir-repair.md §3.1-6).
  relay-state-dir-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect state-dir-lint-relevant changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            if git diff --name-only "$base" "$head" -- \
                'deploy/docker-compose.yml' \
                'services/relay/Dockerfile' \
                '.github/workflows/deploy-lint.yml' \
                | grep -q .; then
              echo "relevant=true" >> "$GITHUB_OUTPUT"
            else
              echo "relevant=false" >> "$GITHUB_OUTPUT"
              echo "::notice::No compose or Dockerfile changes — skipping state-dir invariants."
            fi
          else
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install PyYAML
        if: steps.changes.outputs.relevant == 'true'
        run: |
          python3 -m pip install --quiet --user PyYAML
          python3 -c "import yaml; print(f'PyYAML {yaml.__version__}')"

      - name: Verify relay state-dir persistence invariants
        if: steps.changes.outputs.relevant == 'true'
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import sys
          import yaml

          COMPOSE = "deploy/docker-compose.yml"
          DOCKERFILE = "services/relay/Dockerfile"

          try:
              with open(COMPOSE, "r", encoding="utf-8") as f:
                  doc = yaml.safe_load(f)
          except FileNotFoundError:
              print(f"::error file={COMPOSE}::compose file missing")
              sys.exit(2)

          try:
              with open(DOCKERFILE, "r", encoding="utf-8") as f:
                  dockerfile = f.read()
          except FileNotFoundError:
              print(f"::error file={DOCKERFILE}::Dockerfile missing")
              sys.exit(2)

          services = (doc or {}).get("services", {}) or {}
          relay = services.get("relay", {}) or {}

          failures = []

          # Invariant 1 — read_only:true on the relay rootfs.
          # If this regresses the pre-fix silent-EROFS bug becomes silently
          # invisible again (writes might succeed against a writable rootfs
          # depending on other config), which reintroduces the observability
          # gap the fix closes. LOCKED at mini-lock §3.2.
          if relay.get("read_only") is not True:
              failures.append(
                  "Inv-1 (read_only:true) — relay service must set "
                  "`read_only: true` at deploy/docker-compose.yml. This is the "
                  "load-bearing rootfs posture the state-dir fix depends on."
              )

          # Invariant 2 — WRITABLE volume mount whose CONTAINER TARGET is
          # exactly /var/phantom (not a superstring like /var/phantom_bak).
          # Splitting the target from RELAY_STATE_DIR (Inv-3) lands writes
          # back on the read-only rootfs (Inv-1). A `:ro` short-form mount
          # or a long-form dict with `read_only: true` is REJECTED — the
          # relay writes there, so a read-only bind produces EACCES on
          # every append.
          volumes = relay.get("volumes", []) or []
          # Modes that keep the mount writable but may appear as trailing
          # tokens. `ro` is intentionally OMITTED here — its presence
          # anywhere in the mode list disqualifies the mount.
          WRITABLE_MODES = {
              "rw", "z", "Z",
              "shared", "slave", "private",
              "rshared", "rslave", "rprivate",
              "consistent", "cached", "delegated",
          }
          def _writable_mount_target(entry):
              """
              Return the CONTAINER TARGET path if the mount is writable at
              that target, else None. Rejects read-only mounts (short-form
              `:ro`, comma-separated `:ro,z`, or long-form `read_only: true`).
              """
              if isinstance(entry, dict):
                  # docker-compose long form:
                  # {"source": ..., "target": "/var/phantom", "read_only": bool}
                  if entry.get("read_only") is True:
                      return None
                  return entry.get("target")
              if isinstance(entry, str):
                  s = entry.strip()
                  # Short form: `[SOURCE:]TARGET[:MODE[,MODE...]]`.
                  parts = s.split(":")
                  if len(parts) < 2:
                      return None
                  # If the last segment is a mode-list (all tokens known),
                  # check for `ro` inside and pop off.
                  last = parts[-1]
                  last_tokens = last.split(",")
                  if all(tok in WRITABLE_MODES or tok == "ro" for tok in last_tokens):
                      if "ro" in last_tokens:
                          return None
                      parts.pop()
                      if len(parts) < 2:
                          return None
                  return parts[-1]
              return None
          writable_targets = [_writable_mount_target(v) for v in volumes]
          if "/var/phantom" not in writable_targets:
              failures.append(
                  "Inv-2 (volume mount) — relay service must mount a "
                  "WRITABLE volume with container TARGET exactly "
                  "`/var/phantom` (e.g. `phantom-reports:/var/phantom`). "
                  "A `:ro` short-form or `read_only: true` long-form mount "
                  "at this target does NOT satisfy the invariant — the relay "
                  "writes reports/blocklist/push_tokens/prekeys there. "
                  f"Observed writable targets: {[t for t in writable_targets if t]!r}."
              )

          # Invariant 3 — RELAY_STATE_DIR: /var/phantom env var.
          # The path MUST match the volume target above (Inv-2). Also
          # matches the Dockerfile WORKDIR (Inv-4).
          env = relay.get("environment", {}) or {}
          state_dir_env = env.get("RELAY_STATE_DIR") if isinstance(env, dict) else None
          if state_dir_env != "/var/phantom":
              failures.append(
                  "Inv-3 (RELAY_STATE_DIR env) — relay service must set "
                  "`RELAY_STATE_DIR: /var/phantom` under `environment:` at "
                  "deploy/docker-compose.yml. Current value: "
                  f"{state_dir_env!r}."
              )

          # Invariant 4 — Dockerfile WORKDIR /var/phantom defence-in-depth,
          # anchored to an ACTUAL DIRECTIVE (not text inside a comment)
          # AND scoped to the `AS runtime` stage (not the builder). A
          # WORKDIR in Stage 1 only affects the build image; a runtime
          # container that inherits from `AS runtime` sees the default
          # `/` CWD unless the runtime stage itself sets WORKDIR. So a
          # `WORKDIR /var/phantom` present only inside `AS builder`
          # would silently reintroduce the pre-fix bug.
          def _has_workdir_directive_in_stage(source: str, target: str, stage: str) -> bool:
              lines = source.splitlines()
              # Find the FROM ... AS <stage> line (case-insensitive on the
              # directive keywords, case-sensitive on the stage name because
              # Docker is case-insensitive on FROM/AS keywords but treats
              # the alias itself as its literal string).
              stage_start = None
              for i, raw in enumerate(lines):
                  line = raw.split("#", 1)[0].strip()
                  if not line:
                      continue
                  parts = line.split()
                  if (
                      len(parts) >= 4
                      and parts[0].upper() == "FROM"
                      and parts[-2].upper() == "AS"
                      and parts[-1] == stage
                  ):
                      stage_start = i
                      break
              if stage_start is None:
                  return False
              # Scan every subsequent line until the next FROM (which starts
              # a new stage) or EOF.
              for raw in lines[stage_start + 1:]:
                  line = raw.split("#", 1)[0].strip()
                  if not line:
                      continue
                  parts = line.split()
                  if parts and parts[0].upper() == "FROM":
                      break  # entered a new stage
                  if line == f"WORKDIR {target}" or line.startswith(
                      f"WORKDIR {target} "
                  ) or line.startswith(f"WORKDIR {target}\t"):
                      return True
              return False
          if not _has_workdir_directive_in_stage(dockerfile, "/var/phantom", "runtime"):
              failures.append(
                  "Inv-4 (Dockerfile WORKDIR) — services/relay/Dockerfile "
                  "must declare an uncommented `WORKDIR /var/phantom` "
                  "directive INSIDE the `FROM ... AS runtime` stage. "
                  "A `WORKDIR /var/phantom` token in a `#` comment does NOT "
                  "count, and a WORKDIR directive in the builder stage does "
                  "NOT satisfy the runtime CWD invariant."
              )

          if failures:
              print("::error::RC-RELAY-STATE-DIR-REPAIR PR-1a state-dir invariants violated:")
              for f in failures:
                  print(f"::error::  {f}")
              print()
              print("See docs/tracks/rc-relay-state-dir-repair.md §5 for the")
              print("full contract; §7.2 for these exact assertions.")
              sys.exit(1)

          print("All four state-dir invariants hold. PASS.")
          PYEOF
